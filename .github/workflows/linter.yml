---
name: "Lint Code Base"

'on':
  pull_request:
    branches: [main]
  workflow_dispatch:

# Minimal permissions following principle of least privilege
permissions:
  contents: read

jobs:
  build:
    name: "Lint Code Base"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6

      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: "Cache npm downloads"
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('.github/workflows/linter.yml') }}

      - name: "Install lint tools"
        run: npm install --no-save --engine-strict=false eslint @eslint/js eslint-plugin-n markdownlint-cli2

      - name: "Lint JavaScript (ESLint)"
        run: npx eslint .

      - name: "Lint Markdown"
        run: npx markdownlint-cli2 "**/*.md" "#node_modules"

      - name: "Lint YAML"
        run: pip install --quiet yamllint && yamllint .

      - name: "Lint JSON"
        run: |
          find . -name '*.json' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -print0 | xargs -0 -I{} node -e "JSON.parse(require('fs').readFileSync('{}','utf8'))"